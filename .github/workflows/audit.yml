name: App Access Audit

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'  # daily at 06:00 UTC

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Audit agent app installation
        env:
          GH_APP_ID: ${{ secrets.GH_APP_ID }}
          GH_APP_PEM_B64: ${{ secrets.GH_APP_PEM }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash internal/audit.sh
