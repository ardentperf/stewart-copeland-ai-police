name: E2E Tests

on:
  push:
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * *'  # daily at 07:00 UTC (after inventory at 06:00)

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get install -y jq
      - name: Run e2e tests
        env:
          GH_APP_ID: ${{ secrets.GH_APP_ID }}
          GH_APP_PEM_B64: ${{ secrets.GH_APP_PEM }}
        run: |
          if [[ -z "$GH_APP_ID" || -z "$GH_APP_PEM_B64" ]]; then
            echo "Skipping e2e tests: app not installed yet (GH_APP_ID/GH_APP_PEM not set)."
            exit 0
          fi
          bash tests/e2e-test.sh
