name: Unit Tests

on:
  push:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get install -y jq
          pip install PyNaCl
      - name: Run unit tests
        run: bash tests/unit-test.sh
